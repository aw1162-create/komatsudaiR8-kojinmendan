<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小松台小R8個人面談調整アプリ</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React 18 & ReactDOM 18 安定版CDN (Babel不要の高速・高安定動作構成) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>

  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in {
      animation: fadeIn 0.2s ease-out forwards;
    }
    @keyframes scaleUp {
      from { transform: scale(0.97); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    .animate-scale-up {
      animation: scaleUp 0.12s ease-out forwards;
    }
    /* ウィンドウへの自動調節用スタイル */
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden; /* 画面全体のスクロールを完全禁止 */
      background-color: #f1f5f9;
    }
  </style>
</head>
<body class="text-slate-900 font-sans antialiased">

  <div id="root" class="h-full flex flex-col overflow-hidden"></div>

  <script>
    const { useState, useEffect, createElement: h } = React;

    // --- インラインSVGアイコンコンポーネント (属性指定を純粋なJS仕様に統一) ---
    const Icon = ({ name, className = "w-5 h-5" }) => {
      const icons = {
        Calendar: h("svg", { className, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2.5", strokeLinecap: "round", strokeLinejoin: "round" },
          h("rect", { x: "3", y: "4", width: "18", height: "18", rx: "2", ry: "2" }),
          h("line", { x1: "16", y1: "2", x2: "16", y2: "6" }),
          h("line", { x1: "8", y1: "2", x2: "8", y2: "6" }),
          h("line", { x1: "3", y1: "10", x2: "21", y2: "10" })
        ),
        Users: h("svg", { className, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2.5", strokeLinecap: "round", strokeLinejoin: "round" },
          h("path", { d: "M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" }),
          h("circle", { cx: "9", cy: "7", r: "4" }),
          h("path", { d: "M23 21v-2a4 4 0 0 0-3-3.87" }),
          h("path", { d: "M16 3.13a4 4 0 0 1 0 7.75" })
        ),
        Check: h("svg", { className, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "3", strokeLinecap: "round", strokeLinejoin: "round" },
          h("polyline", { points: "20 6 9 17 4 12" })
        ),
        X: h("svg", { className, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "3", strokeLinecap: "round", strokeLinejoin: "round" },
          h("line", { x1: "18", y1: "6", x2: "6", y2: "18" }),
          h("line", { x1: "6", y1: "6", x2: "18", y2: "18" })
        ),
        Sparkles: h("svg", { className, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2", strokeLinecap: "round", strokeLinejoin: "round" },
          h("path", { d: "M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-12.728l.707.707m11.314 11.314l.707.707M12 7a5 5 0 1 0 0 10 5 5 0 0 0 0-10z" })
        ),
        RotateCcw: h("svg", { className, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2.5", strokeLinecap: "round", strokeLinejoin: "round" },
          h("path", { d: "M2.5 2v6h6" }),
          h("path", { d: "M2.66 15.57a10 10 0 1 0-.57-8.38l5.67-5.67" })
        ),
        UserPlus: h("svg", { className, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2.5", strokeLinecap: "round", strokeLinejoin: "round" },
          h("path", { d: "M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" }),
          h("circle", { cx: "9", cy: "7", r: "4" }),
          h("line", { x1: "19", y1: "8", x2: "19", y2: "14" }),
          h("line", { x1: "22", y1: "11", x2: "16", y2: "11" })
        ),
        Trash2: h("svg", { className, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2.5", strokeLinecap: "round", strokeLinejoin: "round" },
          h("polyline", { points: "3 6 5 6 21 6" }),
          h("path", { d: "M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" }),
          h("line", { x1: "10", y1: "11", x2: "10", y2: "17" }),
          h("line", { x1: "14", y1: "11", x2: "14", y2: "17" })
        ),
        ChevronRight: h("svg", { className, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "3", strokeLinecap: "round", strokeLinejoin: "round" },
          h("polyline", { points: "9 18 15 12 9 6" })
        ),
        AlertCircle: h("svg", { className, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2.5", strokeLinecap: "round", strokeLinejoin: "round" },
          h("circle", { cx: "12", cy: "12", r: "10" }),
          h("line", { x1: "12", y1: "8", x2: "12", y2: "12" }),
          h("line", { x1: "12", y1: "16", x2: "12.01", y2: "16" })
        ),
        Clock: h("svg", { className, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2.5", strokeLinecap: "round", strokeLinejoin: "round" },
          h("circle", { cx: "12", cy: "12", r: "10" }),
          h("polyline", { points: "12 6 12 12 16 14" })
        ),
        Settings: h("svg", { className, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2.5", strokeLinecap: "round", strokeLinejoin: "round" },
          h("circle", { cx: "12", cy: "12", r: "3" }),
          h("path", { d: "M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" })
        ),
        HelpCircle: h("svg", { className, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2.5", strokeLinecap: "round", strokeLinejoin: "round" },
          h("circle", { cx: "12", cy: "12", r: "10" }),
          h("path", { d: "M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" }),
          h("line", { x1: "12", y1: "17", x2: "12.01", y2: "17" })
        ),
        ClipboardList: h("svg", { className, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2.5", strokeLinecap: "round", strokeLinejoin: "round" },
          h("path", { d: "M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2" }),
          h("rect", { x: "8", y: "2", width: "8", height: "4", rx: "1", ry: "1" }),
          h("line", { x1: "9", y1: "12", x2: "15", y2: "12" }),
          h("line", { x1: "9", y1: "16", x2: "15", y2: "16" }),
          h("line", { x1: "9", y1: "8", x2: "10", y2: "8" }),
          h("line", { x1: "9", y1: "10", x2: "10", y2: "10" })
        )
      };
      return icons[name] || null;
    };

    // --- 定数（初期状態デフォルト設定） ---
    const DEFAULT_DAYS = ['24日(金)', '27日(月)', '28日(火)', '29日(水)', '30日(木)', '31日(金)'];
    const DEFAULT_TIME_SLOTS = [
      '13:10 - 13:25',
      '13:35 - 13:50',
      '14:00 - 14:15',
      '14:25 - 14:40',
      '14:50 - 15:05',
      '15:15 - 15:30',
      '15:40 - 15:55',
      '16:05 - 16:20',
    ];

    const INITIAL_MEMBERS = [
      {
        id: 'm1',
        name: 'サンプル 太郎',
        availability: {
          '24日(金)': [0, 0, 0, 0, 0, 0, 0, 0],
          '27日(月)': [0, 0, 0, 0, 0, 0, 0, 0],
          '28日(火)': [0, 0, 0, 0, 0, 0, 0, 0],
          '29日(水)': [0, 0, 0, 0, 0, 0, 0, 0],
          '30日(木)': [0, 0, 0, 0, 0, 0, 0, 0],
          '31日(金)': [0, 0, 0, 0, 0, 0, 0, 0]
        }
      },
      {
        id: 'm2',
        name: '小松 うてな',
        availability: {
          '24日(金)': [0, 0, 0, 0, 0, 0, 0, 0],
          '27日(月)': [0, 0, 0, 0, 0, 0, 0, 0],
          '28日(火)': [0, 0, 0, 0, 0, 0, 0, 0],
          '29日(水)': [0, 0, 0, 0, 0, 0, 0, 0],
          '30日(木)': [0, 0, 0, 0, 0, 0, 0, 0],
          '31日(金)': [0, 0, 0, 0, 0, 0, 0, 0]
        }
      }
    ];

    // 姓名を姓と名で分割し、カード内で2行で表示するヘルパー関数
    const renderSplitName = (fullName) => {
      const parts = fullName.trim().split(/[\s　]+/);
      if (parts.length >= 2) {
        return h("div", { className: "flex flex-col items-center justify-center leading-tight w-full text-center" },
          h("span", { className: "text-base md:text-lg font-black text-slate-900 tracking-wide block truncate max-w-full" }, parts[0]),
          h("span", { className: "text-xs md:text-sm font-bold text-indigo-950 block truncate max-w-full mt-0.5" }, parts[1])
        );
      }
      if (fullName.length >= 3) {
        const half = Math.ceil(fullName.length / 2);
        return h("div", { className: "flex flex-col items-center justify-center leading-tight w-full text-center" },
          h("span", { className: "text-base md:text-lg font-black text-slate-900 tracking-wide block truncate max-w-full" }, fullName.slice(0, half)),
          h("span", { className: "text-xs md:text-sm font-bold text-indigo-950 block truncate max-w-full mt-0.5" }, fullName.slice(half))
        );
      }
      return h("span", { className: "text-base md:text-lg font-black text-slate-900 truncate max-w-full block text-center" }, fullName);
    };

    function App() {
      const [view, setView] = useState('main');
      const [members, setMembers] = useState(INITIAL_MEMBERS);
      const [schedule, setSchedule] = useState({});
      const [days, setDays] = useState(DEFAULT_DAYS);
      const [timeSlots, setTimeSlots] = useState(DEFAULT_TIME_SLOTS);
      const [daysInput, setDaysInput] = useState(DEFAULT_DAYS.join(', '));
      const [timeSlotsInput, setTimeSlotsInput] = useState(DEFAULT_TIME_SLOTS.join('\n'));

      const [draggingMemberId, setDraggingMemberId] = useState(null);
      const [dragSource, setDragSource] = useState(null); 

      const [paintStart, setPaintStart] = useState(null);
      const [paintCurrent, setPaintCurrent] = useState(null);
      const [paintValue, setPaintValue] = useState(1);

      const [selectedMemberId, setSelectedMemberId] = useState('');
      const [newMemberName, setNewMemberName] = useState('');
      const [bulkNamesInput, setBulkNamesInput] = useState('');

      // --- 確認ダイアログ・削除用ステート ---
      const [confirmType, setConfirmType] = useState(null); // 'delete-member' | 'clear-schedule' | 'reset-all' | null
      const [targetMember, setTargetMember] = useState(null); // { id, name }
      const [toast, setToast] = useState(null);

      useEffect(() => {
        const savedMembers = localStorage.getItem('adv_adjust_members');
        const savedSchedule = localStorage.getItem('adv_adjust_schedule');
        const savedDays = localStorage.getItem('adv_adjust_days');
        const savedTimeSlots = localStorage.getItem('adv_adjust_time_slots');

        if (savedMembers) { try { setMembers(JSON.parse(savedMembers)); } catch (e) {} }
        if (savedSchedule) { try { setSchedule(JSON.parse(savedSchedule)); } catch (e) {} }
        if (savedDays) { 
          try { 
            const parsedDays = JSON.parse(savedDays);
            setDays(parsedDays);
            setDaysInput(parsedDays.join(', '));
          } catch (e) {} 
        }
        if (savedTimeSlots) { 
          try { 
            const parsedSlots = JSON.parse(savedTimeSlots);
            setTimeSlots(parsedSlots);
            setTimeSlotsInput(parsedSlots.join('\n'));
          } catch (e) {} 
        }
      }, []);

      useEffect(() => { localStorage.setItem('adv_adjust_members', JSON.stringify(members)); }, [members]);
      useEffect(() => { localStorage.setItem('adv_adjust_schedule', JSON.stringify(schedule)); }, [schedule]);
      useEffect(() => { localStorage.setItem('adv_adjust_days', JSON.stringify(days)); }, [days]);
      useEffect(() => { localStorage.setItem('adv_adjust_time_slots', JSON.stringify(timeSlots)); }, [timeSlots]);

      useEffect(() => {
        if (view === 'settings' && members.length > 0 && !selectedMemberId) {
          setSelectedMemberId(members[0].id);
        }
      }, [view, members, selectedMemberId]);

      // 矩形ドラッグ範囲選択処理
      useEffect(() => {
        const handleGlobalMouseUp = () => {
          if (paintStart && paintCurrent && selectedMemberId) {
            const minX = Math.min(paintStart.dayIdx, paintCurrent.dayIdx);
            const maxX = Math.max(paintStart.dayIdx, paintCurrent.dayIdx);
            const minY = Math.min(paintStart.timeIdx, paintCurrent.timeIdx);
            const maxY = Math.max(paintStart.timeIdx, paintCurrent.timeIdx);

            setMembers(prevMembers => prevMembers.map(m => {
              if (m.id === selectedMemberId) {
                const updatedAvail = { ...m.availability };
                days.forEach((day, dIdx) => {
                  if (dIdx >= minX && dIdx <= maxX) {
                    const currentVals = updatedAvail[day] ? [...updatedAvail[day]] : Array(timeSlots.length).fill(0);
                    while (currentVals.length < timeSlots.length) { currentVals.push(0); }
                    for (let tIdx = minY; tIdx <= maxY; tIdx++) {
                      currentVals[tIdx] = paintValue;
                    }
                    updatedAvail[day] = currentVals;
                  }
                });
                return { ...m, availability: updatedAvail };
              }
              return m;
            }));
            showToast('選択範囲の日程を更新しました');
          }
          setPaintStart(null);
          setPaintCurrent(null);
        };

        window.addEventListener('mouseup', handleGlobalMouseUp);
        return () => window.removeEventListener('mouseup', handleGlobalMouseUp);
      }, [paintStart, paintCurrent, paintValue, selectedMemberId, days, timeSlots]);

      const showToast = (message, type = 'success') => {
        setToast({ message, type });
        setTimeout(() => setToast(null), 3500);
      };

      // 生徒の削除実行
      const executeDelete = (id) => {
        if (!id) return;
        
        setMembers(prevMembers => {
          const nextMembers = prevMembers.filter(m => m.id !== id);
          if (selectedMemberId === id) {
            setSelectedMemberId(nextMembers.length > 0 ? nextMembers[0].id : '');
          }
          return nextMembers;
        });

        setSchedule(prevSchedule => {
          const nextSchedule = { ...prevSchedule };
          Object.keys(nextSchedule).forEach(key => {
            if (nextSchedule[key] === id) { delete nextSchedule[key]; }
          });
          return nextSchedule;
        });

        showToast("生徒を削除しました。", "info");
        setConfirmType(null);
        setTargetMember(null);
      };

      const executeClearSchedule = () => {
        setSchedule({});
        showToast("割り当てをリセットしました。");
        setConfirmType(null);
      };

      const executeResetAll = () => {
        setMembers(INITIAL_MEMBERS);
        setSchedule({});
        setDays(DEFAULT_DAYS);
        setDaysInput(DEFAULT_DAYS.join(', '));
        setTimeSlots(DEFAULT_TIME_SLOTS);
        setTimeSlotsInput(DEFAULT_TIME_SLOTS.join('\n'));
        setSelectedMemberId('m1');
        setView('main');
        showToast("完全リセットしました。", "info");
        setConfirmType(null);
      };

      const isAvailable = (memberId, day, timeIndex) => {
        const member = members.find(m => m.id === memberId);
        if (!member) return false;
        if (!member.availability || !member.availability[day]) return false;
        const dayAvail = member.availability[day];
        return dayAvail[timeIndex] === undefined ? false : dayAvail[timeIndex] === 1;
      };

      const getDragHighlightClass = (day, timeIndex) => {
        if (!draggingMemberId) return 'border-slate-200 hover:border-indigo-400';
        const isAvail = isAvailable(draggingMemberId, day, timeIndex);
        return isAvail 
          ? 'bg-emerald-100 border-emerald-500 border-4 scale-102 shadow-lg z-10' 
          : 'bg-rose-100 border-rose-500 border-4 scale-98 opacity-90 z-10';
      };

      const handleAddMember = (e) => {
        e.preventDefault();
        if (!newMemberName.trim()) return;

        const newId = 'm_' + Date.now();
        const defaultAvailability = {};
        days.forEach(day => {
          defaultAvailability[day] = Array(timeSlots.length).fill(0);
        });

        const newMember = {
          id: newId,
          name: newMemberName.trim(),
          availability: defaultAvailability
        };

        setMembers([...members, newMember]);
        setSelectedMemberId(newId);
        setNewMemberName('');
        showToast(`メンバー「${newMember.name}」を追加しました。`);
      };

      const handleBulkAddMembers = (e) => {
        e.preventDefault();
        if (!bulkNamesInput.trim()) return;

        const names = bulkNamesInput
          .split(/[\n,、\t]+/)
          .map(name => name.trim())
          .filter(name => name.length > 0);

        if (names.length === 0) {
          showToast('名前リストが空欄です。', 'warning');
          return;
        }

        const timestampBase = Date.now();
        const newMembers = names.map((name, idx) => {
          const defaultAvailability = {};
          days.forEach(day => {
            defaultAvailability[day] = Array(timeSlots.length).fill(0);
          });
          return {
            id: `m_bulk_${timestampBase}_${idx}`,
            name,
            availability: defaultAvailability
          };
        });

        setMembers([...members, ...newMembers]);
        if (newMembers.length > 0) {
          setSelectedMemberId(newMembers[0].id);
        }
        setBulkNamesInput('');
        showToast(`${newMembers.length}名の一括登録が完了しました。`);
      };

      const isInPaintRange = (dayIdx, timeIdx) => {
        if (!paintStart || !paintCurrent) return false;
        const minX = Math.min(paintStart.dayIdx, paintCurrent.dayIdx);
        const maxX = Math.max(paintStart.dayIdx, paintCurrent.dayIdx);
        const minY = Math.min(paintStart.timeIdx, paintCurrent.timeIdx);
        const maxY = Math.max(paintStart.timeIdx, paintCurrent.timeIdx);
        return dayIdx >= minX && dayIdx <= maxX && timeIdx >= minY && timeIdx <= maxY;
      };

      const handlePaintStart = (dayIdx, timeIdx, currentVal) => {
        if (!selectedMemberId) return;
        const nextVal = currentVal === 1 ? 0 : 1;
        setPaintValue(nextVal);
        setPaintStart({ dayIdx, timeIdx });
        setPaintCurrent({ dayIdx, timeIdx });
      };

      const handlePaintEnter = (dayIdx, timeIdx) => {
        if (paintStart) { setPaintCurrent({ dayIdx, timeIdx }); }
      };

      const setAllAvailability = (status) => {
        if (!selectedMemberId) return;
        setMembers(members.map(m => {
          if (m.id === selectedMemberId) {
            const updatedAvail = {};
            days.forEach(day => {
              updatedAvail[day] = Array(timeSlots.length).fill(status);
            });
            return { ...m, availability: updatedAvail };
          }
          return m;
        }));
        showToast(status === 1 ? 'すべてのコマを「可能」にしました' : 'すべてのコマを「不可」にしました');
      };

      const handleSaveAxisConfig = (e) => {
        e.preventDefault();
        const parsedDays = daysInput.split(/[,，、\s]+/).map(d => d.trim()).filter(d => d.length > 0);
        const parsedSlots = timeSlotsInput.split('\n').map(s => s.trim()).filter(s => s.length > 0);

        if (parsedDays.length === 0 || parsedSlots.length === 0) {
          showToast('横軸と縦軸は最低1つ以上入力してください。', 'warning');
          return;
        }

        setDays(parsedDays);
        setTimeSlots(parsedSlots);
        setView('main');
        showToast('調整表の軸設定を更新しました。');
      };

      const handleDragStart = (memberId, source) => {
        setDraggingMemberId(memberId);
        setDragSource(source);
      };

      const handleDrop = (day, timeIndex) => {
        if (!draggingMemberId) return;
        const key = `${day}-${timeIndex}`;
        const oldKey = dragSource.type === 'grid' ? `${dragSource.day}-${dragSource.timeIndex}` : null;

        setSchedule(prev => {
          const next = { ...prev };
          if (oldKey) { delete next[oldKey]; }
          const existingMemberId = next[key];
          if (existingMemberId && dragSource.type === 'grid') {
            next[oldKey] = existingMemberId;
          }
          next[key] = draggingMemberId;
          return next;
        });
        setDraggingMemberId(null);
        setDragSource(null);
      };

      const handleRemoveFromSchedule = (day, timeIndex) => {
        const key = `${day}-${timeIndex}`;
        setSchedule(prev => {
          const next = { ...prev };
          delete next[key];
          return next;
        });
      };

      const handleAutoSchedule = () => {
        const newSched = {};
        const sortedMembers = [...members].map(m => {
          let score = 0;
          days.forEach(day => {
            timeSlots.forEach((_, idx) => { if (isAvailable(m.id, day, idx)) score++; });
          });
          return { ...m, score };
        }).sort((a, b) => a.score - b.score);

        const allSlots = [];
        days.forEach(day => {
          timeSlots.forEach((_, idx) => { allSlots.push({ day, timeIndex: idx, key: `${day}-${idx}` }); });
        });

        const solve = (index) => {
          if (index === sortedMembers.length) return true;

                              onMouseDown: (e) => { e.preventDefault(); handlePaintStart(dayIdx, timeIdx, isAvail ? 1 : 0); },
                              onMouseEnter: () => handlePaintEnter(dayIdx, timeIdx),
                              className: "flex-1 p-0.5 border-l border-slate-200 cursor-pointer flex items-stretch min-h-0 h-full"
                            },
                              h("div", { className: `w-full h-full rounded-lg flex flex-col items-center justify-center border transition-all ${bgClass}` },
                                iconElement,
                                h("span", { className: "text-[9px] font-black leading-none mt-0.5" }, textText)
                              )
                            );
                          })
                        ))
                      )
                    )
                  ),
                  h("div", { className: "p-3 bg-slate-50 border-t-2 border-slate-150 text-center flex-shrink-0" },
                    h("button", { onClick: () => setView('main'), className: "px-5 py-2 bg-slate-900 hover:bg-slate-950 text-white font-black rounded-lg text-xs shadow flex items-center gap-1 mx-auto" }, h(Icon, { name: "Calendar", className: "w-3.5 h-3.5" }), "メイン調整表に戻る")
                  )
                );
              })() : h("div", { className: "p-12 text-center text-slate-400 font-bold h-full flex flex-col justify-center items-center" }, h(Icon, { name: "Users", className: "w-12 h-12 text-slate-300 mb-3" }), "左の名簿からメンバーを選択して設定を開始してください。")
            )
          ),
          
          view === 'axis-config' && h("div", { className: "max-w-3xl mx-auto bg-white rounded-2xl border-2 border-slate-200 shadow-md overflow-hidden animate-fade-in flex flex-col max-h-full" },
            h("div", { className: "p-4 bg-indigo-50/70 border-b-2 border-slate-200 flex-shrink-0" },
              h("h2", { className: "text-lg md:text-xl font-black text-slate-900 flex items-center gap-1.5" }, h(Icon, { name: "Settings", className: "w-5 h-5 text-indigo-600" }), "縦軸・横軸のカスタマイズ"),
              h("p", { className: "text-xs text-slate-600 font-bold mt-0.5" }, "表の日程（横軸）と時間帯枠（縦軸）を柔軟に変更できます。")
            ),
            h("form", { onSubmit: handleSaveAxisConfig, className: "p-5 space-y-4 overflow-y-auto flex-1 text-xs md:text-sm" },
              h("div", {},
                h("label", { className: "block font-black text-slate-700 mb-1" }, "横軸：日程・日付・曜日（カンマ「,」で区切ってください）"),
                h("input", {
                  type: "text",
                  value: daysInput,
                  onChange: (e) => setDaysInput(e.target.value),
                  className: "w-full px-3 py-2 bg-slate-50 border-2 border-slate-200 rounded-lg focus:outline-none focus:border-indigo-500 font-bold"
                }),
                h("p", { className: "text-[10px] text-slate-400 font-bold mt-0.5" }, "例: 24日(金), 27日(月), 28日(火)")
              ),
              h("div", {},
                h("label", { className: "block font-black text-slate-700 mb-1" }, "縦軸：時間枠スロット（1行に1コマ分入力してください）"),
                h("textarea", {
                  rows: "5",
                  value: timeSlotsInput,
                  onChange: (e) => setTimeSlotsInput(e.target.value),
                  className: "w-full px-3 py-2 bg-slate-50 border-2 border-slate-200 rounded-lg focus:outline-none focus:border-indigo-500 font-bold resize-none"
                })
              ),
              h("div", { className: "flex gap-3 pt-3 border-t border-slate-100 flex-shrink-0" },
                h("button", { type: "button", onClick: () => setView('main'), className: "flex-1 py-2.5 bg-slate-200 hover:bg-slate-300 text-slate-800 font-black rounded-lg text-xs transition-colors" }, "キャンセル"),
                h("button", { type: "submit", className: "flex-1 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white font-black rounded-lg text-xs transition-colors shadow-xs" }, "変更を適用する")
              )
            )
          )
        ),
        
        // フッター
        h("footer", { className: "bg-white border-t-2 border-slate-200 py-2 text-center text-[10px] md:text-xs text-slate-500 font-bold flex-shrink-0" },
          h("div", { className: "max-w-[95%] xl:max-w-[1600px] mx-auto px-4 flex flex-col md:flex-row justify-between items-center gap-1" },
            h("p", {}, "© 2026 小松台小R8個人面談調整アプリ - GitHub公開対応"),
            h("div", { className: "flex gap-2" },
              h("span", {}, "データ自動セーブ保存: 有効"),
              h("span", {}, "|"),
              h("span", {}, "高効率ウィンドウ吸着型フィット表示")
            )
          )
        ),

        // カスタム確認ダイアログ (Stale-Closureフリー設計)
        confirmType && h("div", { className: "fixed inset-0 bg-slate-900/60 backdrop-blur-xs flex items-center justify-center p-6 z-50 animate-fade-in" },
          h("div", { className: "bg-white rounded-2xl p-6 max-w-sm w-full border-2 border-slate-300 shadow-2xl animate-scale-up text-xs md:text-sm" },
            h("h3", { className: "text-base font-extrabold text-slate-900 flex items-center gap-1.5" },
              h(Icon, { name: "AlertCircle", className: "w-5 h-5 text-rose-600" }),
              confirmType === 'delete-member' ? '生徒の削除' :
              confirmType === 'clear-schedule' ? '割り当て表のクリア' :
              confirmType === 'reset-all' ? 'システム全リセット' : ''
            ),
            h("p", { className: "mt-3 text-slate-700 leading-relaxed whitespace-pre-wrap font-bold" },
              confirmType === 'delete-member' ? `本当に「${targetMember?.name}」を削除しますか？\n割り当て済みの全コマからも自動的にクリアされます。` :
              confirmType === 'clear-schedule' ? '現在のスケジュール割り当てをすべてリセットしますか？' :
              confirmType === 'reset-all' ? '登録されたすべての生徒・予定設定を初期状態に戻しますか？' : ''
            ),
            h("div", { className: "mt-5 flex gap-3" },
              h("button", {
                onClick: () => { setConfirmType(null); setTargetMember(null); },
                className: "flex-1 py-2 bg-slate-200 hover:bg-slate-300 text-slate-800 font-black rounded-lg text-xs transition-colors"
              }, "キャンセル"),
              h("button", {
                onClick: () => {
                  if (confirmType === 'delete-member') executeDelete(targetMember?.id);
                  else if (confirmType === 'clear-schedule') executeClearSchedule();
                  else if (confirmType === 'reset-all') executeResetAll();
                },
                className: "flex-1 py-2 bg-rose-600 hover:bg-rose-700 text-white font-black rounded-lg text-xs transition-colors shadow-xs"
              }, "実行する")
            )
          )
        ),

        // トースト通知
        toast && h("div", { className: "fixed bottom-4 right-4 z-50 flex items-center gap-2 px-4 py-2.5 rounded-xl shadow-lg border bg-white text-slate-900 border-slate-200 text-xs md:text-sm font-black animate-scale-up" },
          h("div", { className: "p-1 rounded bg-indigo-50 text-indigo-700" }, h(Icon, { name: "Check", className: "w-4 h-4" })),
          h("span", {}, toast.message),
          h("button", { onClick: () => setToast(null), className: "text-slate-400 hover:text-slate-600 ml-1.5" }, h(Icon, { name: "X", className: "w-3.5 h-3.5" }))
        )
      );
    }

    // 安全なブートストラップ（DOMロード完了を待ってReactを実行）
    window.addEventListener('DOMContentLoaded', () => {
      try {
        const rootElement = document.getElementById('root');
        if (rootElement) {
          const root = ReactDOM.createRoot(rootElement);
          root.render(h(App));
        }
      } catch (err) {
        console.error("Reactのマウント中にエラーが発生しました:", err);
      }
    });
  </script>
</body>
</html>
